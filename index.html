<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pablo y Luisa Garcia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- GOOGLE FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
                  url('your-background.jpg') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    /* EMAIL FORM */
    .email-box {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .email-box input {
      padding: 14px 18px;
      border-radius: 10px;
      border: none;
      width: 260px;
      font-size: 14px;
      outline: none;
    }

    .email-box button {
      padding: 14px 22px;
      background: #00c2a8;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .email-box button:hover {
      background: #00a892;
      transform: scale(1.05);
    }

    footer {
      padding: 20px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Pablo & Luisa</h1>
    <p>Join our journey around the world 🌍</p>

    <!-- MAILCHIMP FORM -->
    <form action="https://pabloyluisagarcia.us9.list-manage.com/subscribe/post?u=6a5eadb807d31f1781acc56a3&amp;id=1ed23d17e2&amp;f_id=009949e1f0"
          method="post"
          target="_blank"
          class="email-box">

      <input type="email" name="EMAIL" placeholder="Enter your email" required>

      <!-- Anti-bot field -->
      <input type="text" name="b_6a5eadb807d31f1781acc56a3_1ed23d17e2"
             tabindex="-1"
             value=""
             style="position:absolute; left:-5000px;">

      <button type="submit">Join Us</button>

    </form>

  </section>

  <footer>
    © 2026 Pablo & Luisa Garcia
  </footer>

</body>
</html>
