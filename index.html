<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pablo & Luisa Garcia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="Favicon.png">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <script src="https://kit.fontawesome.com/yourkitid.js" crossorigin="anonymous"></script>

  <style>

    :root {
      --gold: #d4af37;
      --black: #0a0a0a;
      --gray: #aaa;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: white;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav-links a {
      margin-left: 30px;
      color: white;
      text-decoration: none;
      font-size: 0.9em;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    /* HERO */
    header {
      height: 100vh;
      background: url('Main Image.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    header::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), #0a0a0a);
      top: 0;
      left: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 700px;
    }

    h1 {
      font-size: 3.5em;
      margin: 0;
    }

    .subtitle {
      color: var(--gray);
      margin-top: 10px;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      border: 1px solid var(--gold);
      color: var(--gold);
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: var(--gold);
      color: black;
    }

    /* SECTION */
    .section {
      padding: 100px 20px;
      text-align: center;
    }

    /* YOUTUBE CARDS */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }

    .card {
      width: 320px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.4s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
      text-align: left;
    }

    .card h3 {
      margin: 0;
    }

    .watch {
      margin-top: 10px;
      display: inline-block;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.9em;
    }

    /* STORE */
    .store {
      position: relative;
    }

    .store img {
      width: 100%;
      filter: brightness(0.6);
    }

    .store-text {
      position: absolute;
      top: 30%;
      left: 10%;
      max-width: 400px;
    }

    /* SOCIAL */
    .social-icons i {
      margin: 15px;
      font-size: 24px;
      color: white;
      transition: 0.3s;
    }

    .social-icons i:hover {
      color: var(--gold);
    }

    /* FOOTER */
    footer {
      padding: 30px;
      text-align: center;
      color: var(--gray);
    }

    /* MOBILE */
    @media (max-width: 768px) {
      h1 { font-size: 2.2em; }
      .store-text {
        position: static;
        padding: 20px;
      }
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><strong style="color:var(--gold)">P&L</strong></div>

  <div class="nav-links">
    <a href="#youtube">YouTube</a>
    <a href="#store">Store</a>
    <a href="#social">Social</a>
  </div>
</div>

<!-- HERO -->
<header>
  <div class="hero-content">
    <h1>Pablo & Luisa Garcia</h1>
    <p class="subtitle">Creators • Entrepreneurs • Travelers</p>

    <a href="#" class="btn">JOIN US</a>
  </div>
</header>

<!-- YOUTUBE -->
<div class="section" id="youtube">
  <h2>Our YouTube Channels</h2>

  <div class="cards">

    <div class="card">
      <img src="Main Image.png">
      <div class="card-content">
        <h3>Rock Island</h3>
        <a href="https://www.youtube.com/@RockIsland-LPG-Studios/videos" target="_blank" class="watch">WATCH NOW →</a>
      </div>
    </div>

    <div class="card">
      <img src="Identity.webp">
      <div class="card-content">
        <h3>Turismo Channel</h3>
        <a href="https://www.youtube.com/@turismoenelmundo3058" target="_blank" class="watch">WATCH NOW →</a>
      </div>
    </div>

  </div>
</div>

<!-- STORE -->
<div class="store" id="store">
  <img src="Identity.webp">

  <div class="store-text">
    <h2>Rock Island Apparel</h2>
    <p>Wear the attitude. Live the rock.</p>

    <a href="https://rockisland.pabloyluisagarcia.com/" target="_blank" class="btn">
      SHOP NOW
    </a>
  </div>
</div>

<!-- SOCIAL -->
<div class="section" id="social">
  <h2>Follow Us</h2>

  <div class="social-icons">
    <a href="https://www.instagram.com/rock_island_l_p_g/" target="_blank">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="#">
      <i class="fab fa-tiktok"></i>
    </a>
  </div>
</div>

<footer>
  © 2026 Pablo y Luisa Garcia
</footer>

</body>
</html>
