<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pablo y Luisa Garcia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
    }

    /* HERO */
    header {
      position: relative;
      height: 80vh;
      background: url('Main Image.png') center/cover no-repeat;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 40px;
      color: white;
    }

    header::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 3em;
      margin: 0;
    }

    /* SECTIONS */
    .section {
      padding: 60px 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* BUTTONS */
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #111;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
    }

    /* YOUTUBE */
    iframe {
      margin-top: 20px;
      width: 90%;
      max-width: 600px;
      height: 315px;
      border: none;
      border-radius: 10px;
    }

    /* PREMIUM STORE SECTION */
    .store-premium {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .store-img {
      width: 100%;
      height: auto;
      display: block;
    }

    .store-overlay {
  position: absolute;
  top: 20%;
  left: 10%;
  transform: none;
  text-align: right;
  color: white;
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 10px;
}

    .store-overlay h2 {
      margin: 0 0 10px 0;
      font-size: 2em;
    }

    .store-overlay p {
      margin-bottom: 15px;
      font-size: 1.1em;
    }

    footer {
      padding: 30px;
      font-size: 0.9em;
      background: #f5f5f5;
    }
  </style>
</head>

<body>

<!-- HERO -->
<header>
  <div class="hero-content">
    <h1>Pablo & Luisa Garcia</h1>
    <p>Creators • Entrepreneurs • Travelers</p>
  </div>
</header>

<!-- YOUTUBE -->
<div class="section">
  <h2>🎥 Our YouTube Channels</h2>

  <a href="https://www.youtube.com/@RockIsland-LPG-Studios/videos" target="_blank" class="btn">
    Rock Island Channel
  </a>

  <iframe src="https://www.youtube.com/embed/eokOdDlruzI"></iframe>

  <a href="https://www.youtube.com/@turismoenelmundo3058" target="_blank" class="btn">
    Turismo por el Mundo
  </a>

  <iframe src="https://www.youtube.com/embed/CSgI5UoQPXI"></iframe>
</div>

<!-- STORE PREMIUM -->
<div class="store-premium">
  <img src="Identity.webp" alt="Rock Island Brand" class="store-img">

  <div class="store-overlay">
    <h2>Rock Island Apparel</h2>
    <p>Wear the attitude. Live the rock.</p>

    <a href="https://rockisland.pabloyluisagarcia.com/" target="_blank" class="btn">
      Shop Now
    </a>
  </div>
</div>

<!-- SOCIAL -->
<div class="section">
  <h2>🌎 Follow Us</h2>

  <a href="https://www.instagram.com/rock_island_l_p_g/" target="_blank" class="btn">
    Instagram
  </a>

  <a href="#" class="btn">
    TikTok
  </a>
</div>

<footer>
  © 2026 Pablo y Luisa Garcia
</footer>

</body>
</html>
