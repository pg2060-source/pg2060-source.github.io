<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pablo y Luisa Garcia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
    }

   header {
  position: relative;
  height: 80vh;
  background: url('Main Image.png') center/cover no-repeat;
  display: flex;
  align-items: flex-start; /* move content to top */
  justify-content: center;
  padding-top: 40px; /* space from top */
  color: white;
}
    header::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 3em;
      margin: 0;
    }

   .section {
  padding: 60px 20px;
}

.store-section {
  padding: 0;
  min-height: 100vh;
  background-size: contain !important;
  background-repeat: no-repeat;
  background-position: center;
}

    .section-bg {
      color: white;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .section-bg::after {
      content: "";
      position: absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.5);
    }
.store-section::after {
  display: none;
}
    .section-content {
      position: relative;
      z-index: 1;
    }

    h2 {
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #111;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
    }

    iframe {
      margin-top: 20px;
      width: 90%;
      max-width: 600px;
      height: 315px;
      border: none;
      border-radius: 10px;
    }

    footer {
      padding: 30px;
      font-size: 0.9em;
      background: #f5f5f5;
    }
  </style>
</head>

<body>

<!-- HERO SECTION -->
<header>
  <div class="hero-content">
    <h1>Pablo & Luisa Garcia</h1>
    <p>Creators • Entrepreneurs • Travelers</p>
  </div>
</header>

<div class="section section-bg" style="background-image: url('youtube-bg.jpg');">

    <a href="https://www.youtube.com/@turismoenelmundo3058" target="_blank" class="btn">
      Turismo por el Mundo
    </a>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/CSgI5UoQPXI?si=CKnP0hJG-gffwhvV" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </div>
</div>

<!-- STORE SECTION -->
<div class="section section-bg store-section" style="background-image: url('Identity.webp');">

    <h2>👕 Our Store</h2>

    <a href="https://rockisland.pabloyluisagarcia.com/" target="_blank" class="btn">

<!-- SOCIAL SECTION -->
<div class="section">

  <a href="https://www.instagram.com/rock_island_l_p_g/" target="_blank" class="btn">
    Instagram
  </a>

  <a href="#" class="btn">

  </a>
</div>

<footer>
  © 2026 Pablo y Luisa Garcia
</footer>

</body>
</html>
