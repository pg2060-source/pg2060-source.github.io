<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pablo y Luisa Garcia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.5);
      color: white;
      z-index: 1000;
    }

    .nav-links a {
      margin-left: 20px;
      color: white;
      text-decoration: none;
      font-size: 0.9em;
    }

    /* HERO */
    header {
      position: relative;
      height: 100vh;
      background: url('Main Image.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    header::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3em;
      margin: 0;
    }

    /* EMAIL CAPTURE */
    .email-box {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      border: none;
      border-radius: 5px;
    }

    /* SECTIONS */
    .section {
      padding: 80px 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* BUTTONS */
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #111;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
    }

    /* YOUTUBE */
    iframe {
      margin-top: 20px;
      width: 90%;
      max-width: 700px;
      height: 350px;
      border-radius: 10px;
    }

    /* STORE */
    .store-premium {
      position: relative;
    }

    .store-img {
      width: 100%;
    }

    .store-overlay {
      position: absolute;
      top: 20%;
      right: 8%;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 10px;
      max-width: 320px;
      text-align: left;
    }

    /* FOOTER */
    footer {
      padding: 30px;
      background: #f5f5f5;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .store-overlay {
        position: static;
        margin: 20px;
        text-align: center;
      }

      header {
        height: 80vh;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><strong>Pablo & Luisa</strong></div>
  <div class="nav-links">
    <a href="#youtube">YouTube</a>
    <a href="#store">Store</a>
    <a href="#social">Social</a>
  </div>
</div>

<!-- HERO -->
<header>
  <div class="hero-content">
    <h1>Pablo & Luisa Garcia</h1>
    <p>Creators • Entrepreneurs • Travelers</p>

    <div class="email-box">
      <input type="email" placeholder="Enter your email">
      <a href="#" class="btn">Join Us</a>
    </div>
  </div>
</header>

<!-- YOUTUBE -->
<div class="section" id="youtube">
  <h2>🎥 Our YouTube Channels</h2>

  <a href="https://www.youtube.com/@RockIsland-LPG-Studios/videos" target="_blank" class="btn">
    Rock Island Channel
  </a>

  <iframe src="https://www.youtube.com/embed/eokOdDlruzI"></iframe>

  <a href="https://www.youtube.com/@turismoenelmundo3058" target="_blank" class="btn">
    Turismo por el Mundo
  </a>

  <iframe src="https://www.youtube.com/embed/CSgI5UoQPXI"></iframe>
</div>

<!-- STORE -->
<div class="store-premium" id="store">
  <img src="Identity.webp" class="store-img">

  <div class="store-overlay">
    <h2>Rock Island Apparel</h2>
    <p>Wear the attitude. Live the rock.</p>

    <a href="https://rockisland.pabloyluisagarcia.com/" target="_blank" class="btn">
      Shop Now
    </a>
  </div>
</div>

<!-- SOCIAL -->
<div class="section" id="social">
  <h2>🌎 Follow Us</h2>

  <a href="https://www.instagram.com/rock_island_l_p_g/" target="_blank" class="btn">
    Instagram
  </a>

  <a href="#" class="btn">TikTok</a>
</div>

<footer>
  © 2026 Pablo y Luisa Garcia
</footer>

</body>
</html>
